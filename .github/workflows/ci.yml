name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test and smoke check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal_password
          POSTGRES_DB: portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_USER: portal
          DB_PASSWORD: portal_password
          DB_NAME: portal
          ADMIN_USER: admin
          ADMIN_PASSWORD: admin123
          SESSION_SECRET: ci-test-secret
        run: npm test

      - name: Start server
        env:
          DB_HOST: localhost
          DB_USER: portal
          DB_PASSWORD: portal_password
          DB_NAME: portal
          ADMIN_USER: admin
          ADMIN_PASSWORD: admin123
          SESSION_SECRET: ci-test-secret
          PORT: 3000
        run: |
          npm start &
          for attempt in {1..30}; do
            curl --fail http://localhost:3000/health && exit 0
            sleep 2
          done
          exit 1

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t clothing-cloud:${{ github.sha }} .

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      vars.EC2_HOST != ''

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check deploy secret
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_SSH_KEY repository secret is required for deployment."
            exit 1
          fi

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Trust EC2 host key
        run: ssh-keyscan -H "${{ vars.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        env:
          EC2_USER: ${{ vars.EC2_USER || 'ubuntu' }}
          EC2_HOST: ${{ vars.EC2_HOST }}
          APP_DIR: ${{ vars.EC2_APP_DIR || '~/clothing-cloud' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" "mkdir -p $APP_DIR"
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'backend/node_modules' \
            ./ "$EC2_USER@$EC2_HOST:$APP_DIR/"
          ssh "$EC2_USER@$EC2_HOST" "cd $APP_DIR && docker compose --profile loadbalanced up -d --build"
          ssh "$EC2_USER@$EC2_HOST" "curl --fail http://localhost:3000/health"
