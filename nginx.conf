# nginx as a stand-in for the cloud load balancer.
#
# It distributes incoming requests across the two app instances using the
# default round-robin algorithm and stops sending traffic to an instance that
# fails its health check, exactly as the managed load balancer does in the
# cloud design. Run with: docker compose --profile loadbalanced up

events { worker_connections 1024; }

http {
  upstream portal_app {
    # The two interchangeable application instances.
    server web:3000;
    server web2:3000;
  }

  server {
    listen 80;
    server_name trendwearcloud.dev www.trendwearcloud.dev;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name trendwearcloud.dev www.trendwearcloud.dev;

    ssl_certificate /etc/letsencrypt/live/trendwearcloud.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trendwearcloud.dev/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
      proxy_pass http://portal_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      # Health-based routing: drop a backend after a failed attempt and retry
      # the request against the other instance.
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
